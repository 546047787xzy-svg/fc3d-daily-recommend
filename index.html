<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="小许3D推荐 - 福彩3D每日智能分析、最新开奖、历史数据查询">
    <title>小许3D推荐 | 每日智能分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .number-ball { 
            width: 48px; height: 48px; 
            display:flex; align-items:center; justify-content:center; 
            font-weight:700; font-size:1.3rem; 
            background:linear-gradient(145deg,#c8102e,#a50d26); 
            color:white; border-radius:9999px; 
        }
        .recommend-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-zinc-50">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-red-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-dice text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">小许3D推荐</h1>
                    <p class="text-xs text-zinc-500 -mt-1">每日智能分析</p>
                </div>
            </div>
            <div class="flex items-center gap-x-3">
                <button onclick="shareToWechat()" class="px-4 py-2 text-sm border rounded-2xl hover:bg-zinc-100 flex items-center gap-x-2">
                    <i class="fa-solid fa-share-nodes"></i>
                </button>
                <button onclick="location.reload()" class="px-4 py-2 text-sm border rounded-2xl hover:bg-zinc-100 flex items-center gap-x-2">
                    <i class="fa-solid fa-sync"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-x-2 bg-white px-4 py-1.5 rounded-3xl shadow-sm border mb-3">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="font-medium text-sm">第2026135期 · 2026-05-25</span>
            </div>
            <h2 class="text-4xl font-bold tracking-tighter">小许3D推荐</h2>
        </div>

        <!-- 最新开奖 -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-sm text-zinc-500">最新开奖</div>
                    <div class="flex items-center gap-x-3 mt-2">
                        <div class="flex gap-x-2">
                            <div class="number-ball">1</div>
                            <div class="number-ball">6</div>
                            <div class="number-ball">5</div>
                        </div>
                        <div class="ml-3">
                            <span class="font-semibold">组六</span><br>
                            <span class="text-xs text-zinc-500">和值12 · 跨度5</span>
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-xs text-zinc-500">试机号</div>
                    <div class="font-mono text-2xl font-bold text-red-600">723</div>
                </div>
            </div>
        </div>

        <!-- 今日推荐 -->
        <div class="mb-8">
            <h3 class="text-2xl font-semibold mb-4 px-1">今日智能推荐</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="recommend-card bg-white border rounded-3xl p-5 cursor-pointer" onclick="copyNumbers([1,6,8])">
                    <div class="flex justify-between mb-3">
                        <span class="text-xs px-2.5 py-1 rounded-full bg-red-100 text-red-600">直选</span>
                    </div>
                    <div class="flex gap-x-2 mb-4">
                        <div class="number-ball">1</div>
                        <div class="number-ball">6</div>
                        <div class="number-ball">8</div>
                    </div>
                    <div class="text-sm text-zinc-600">热码延续推荐</div>
                </div>

                <div class="recommend-card bg-white border rounded-3xl p-5 cursor-pointer" onclick="copyNumbers([3,7,9])">
                    <div class="flex justify-between mb-3">
                        <span class="text-xs px-2.5 py-1 rounded-full bg-red-100 text-red-600">直选</span>
                    </div>
                    <div class="flex gap-x-2 mb-4">
                        <div class="number-ball">3</div>
                        <div class="number-ball">7</div>
                        <div class="number-ball">9</div>
                    </div>
                    <div class="text-sm text-zinc-600">跨度回升趋势</div>
                </div>

                <div class="recommend-card bg-white border rounded-3xl p-5 cursor-pointer" onclick="copyNumbers([1,3,5,6,8,9])">
                    <div class="flex justify-between mb-3">
                        <span class="text-xs px-2.5 py-1 rounded-full bg-violet-100 text-violet-600">组六</span>
                    </div>
                    <div class="flex gap-x-2 mb-4">
                        <div class="number-ball">1</div>
                        <div class="number-ball">3</div>
                        <div class="number-ball">5</div>
                        <div class="number-ball">6</div>
                        <div class="number-ball">8</div>
                        <div class="number-ball">9</div>
                    </div>
                    <div class="text-sm text-zinc-600">综合热冷码大底</div>
                </div>
            </div>
        </div>

        <!-- 数据分析 -->
        <div class="bg-white rounded-3xl p-6 border mb-8">
            <h4 class="font-semibold mb-4">数据分析摘要</h4>
            <div class="text-sm text-zinc-600">
                近10期热码1、6、8出现频繁，冷码3、7、9反弹概率较高。建议以热码为主，适当搭配冷码。
            </div>
        </div>

        <!-- 历史开奖 -->
        <div class="bg-white rounded-3xl p-6 border">
            <h4 class="font-semibold mb-4 flex items-center gap-x-2">
                <i class="fa-solid fa-history text-red-500"></i> 
                近期开奖记录
            </h4>
            <div id="history-list" class="space-y-3 text-sm">
                <!-- 自动填充 -->
            </div>
        </div>
    </div>

    <!-- AI聊天按钮 -->
    <div class="fixed bottom-6 right-6 z-50">
        <button onclick="toggleChat()" class="w-14 h-14 bg-red-600 hover:bg-red-700 text-white rounded-2xl shadow-xl flex items-center justify-center text-2xl">
            <i class="fa-solid fa-comment-dots"></i>
        </button>
    </div>

    <!-- AI聊天窗口 -->
    <div id="chat-window" class="hidden fixed bottom-24 right-6 w-80 bg-white rounded-3xl shadow-2xl border overflow-hidden z-50">
        <div class="bg-red-600 text-white p-4 flex justify-between">
            <div class="font-medium">小许AI助手</div>
            <button onclick="toggleChat()" class="text-xl">×</button>
        </div>
        <div id="chat-messages" class="h-80 p-4 overflow-y-auto bg-zinc-50 space-y-3 text-sm">
            <div class="bg-zinc-100 p-3 rounded-2xl">你好！今天想怎么玩3D？</div>
        </div>
        <div class="p-3 border-t">
            <input id="chat-input" type="text" placeholder="输入问题..." 
                   class="w-full border rounded-2xl px-4 py-3 focus:outline-none"
                   onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
    </div>

    <footer class="text-center py-8 text-xs text-zinc-400">
        本站仅供娱乐参考，彩票有风险，购买需谨慎。
    </footer>

    <script>
        // 历史记录加载
        fetch('data.json')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('history-list');
                if (data.history) {
                    data.history.forEach(h => {
                        const d = document.createElement('div');
                        d.className = "flex justify-between items-center py-2 border-b last:border-0";
                        d.innerHTML = `
                            <span class="font-medium">${h.period}期</span>
                            <div class="flex gap-x-1">
                                ${h.numbers.map(n => `<div class="number-ball text-sm w-7 h-7">${n}</div>`).join('')}
                            </div>
                            <span class="text-zinc-500">${h.type}</span>
                        `;
                        list.appendChild(d);
                    });
                }
            });

        // 复制号码
        function copyNumbers(nums) {
            navigator.clipboard.writeText(nums.join('')).then(() => {
                alert('已复制：' + nums.join(''));
            });
        }

        // 分享
        function shareToWechat() {
            const text = "小许3D推荐\n最新：165\n推荐：168 379 135689\n\n查看详情：https://fc3d-daily-recommend.546047787xzy.workers.dev";
            navigator.clipboard.writeText(text).then(() => alert('分享内容已复制！'));
        }

        // AI聊天
        function toggleChat() {
            document.getElementById('chat-window').classList.toggle('hidden');
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;

            const messages = document.getElementById('chat-messages');
            messages.innerHTML += `<div class="bg-red-600 text-white p-3 rounded-2xl ml-auto max-w-[75%]">${msg}</div>`;

            input.value = '';

            setTimeout(() => {
                messages.innerHTML += `<div class="bg-zinc-100 p-3 rounded-2xl max-w-[75%]">建议关注热码1、6、8，搭配冷码3、7。今天可以小胆玩168或379。</div>`;
                messages.scrollTop = messages.scrollHeight;
            }, 700);
        }
    </script>
</body>
</html>
