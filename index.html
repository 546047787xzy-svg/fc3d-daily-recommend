<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小许3D推荐 | 每日智能分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .number-ball { 
            width: 48px; height: 48px; 
            display:flex; align-items:center; justify-content:center; 
            font-weight:700; font-size:1.3rem; 
            background:linear-gradient(145deg,#c8102e,#a50d26); 
            color:white; border-radius:9999px; 
        }
    </style>
</head>
<body class="bg-zinc-50">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-red-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-dice text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">小许3D推荐</h1>
                    <p class="text-xs text-zinc-500 -mt-1">每日智能分析</p>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-x-2 bg-white px-4 py-1.5 rounded-3xl shadow-sm border mb-3">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="font-medium text-sm">第2026142期 · 2026-06-01</span>
            </div>
            <h2 class="text-4xl font-bold tracking-tighter">小许3D推荐</h2>
        </div>

        <!-- 最新开奖 -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-sm text-zinc-500">最新开奖</div>
                    <div class="flex items-center gap-x-3 mt-2">
                        <div class="flex gap-x-2">
                            <div class="number-ball">8</div>
                            <div class="number-ball">9</div>
                            <div class="number-ball">4</div>
                        </div>
                        <div class="ml-3">
                            <span class="font-semibold">组六</span><br>
                            <span class="text-xs text-zinc-500">和值21 · 跨度5</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 上期推荐中奖情况 -->
        <div class="bg-emerald-50 border border-emerald-200 rounded-3xl p-6 mb-8">
            <div class="text-emerald-700 font-bold mb-3 flex items-center gap-2">
                <i class="fa-solid fa-trophy"></i> 上期推荐中奖情况
            </div>
            <div class="text-sm space-y-1">
                <div>✅ 双胆 8、9 <span class="text-emerald-600">命中2码</span></div>
                <div>✅ 5码 4、8、9 <span class="text-emerald-600">命中3码</span></div>
                <div>✅ 多码推荐 <span class="text-emerald-600">命中894</span></div>
            </div>
        </div>

        <!-- 今日推荐 -->
        <div class="space-y-8">
            <!-- 独胆 -->
            <div class="bg-white border rounded-3xl p-6">
                <div class="text-red-600 font-bold text-lg mb-2">★ 独胆</div>
                <div class="text-6xl font-bold text-red-600">5</div>
            </div>

            <!-- 双胆 -->
            <div class="bg-white border rounded-3xl p-6">
                <div class="text-red-600 font-bold text-lg mb-3">★ 双胆</div>
                <div class="flex gap-8">
                    <div class="text-center">
                        <div class="number-ball text-4xl">5</div>
                    </div>
                    <div class="text-center">
                        <div class="number-ball text-4xl">2</div>
                    </div>
                </div>
            </div>

            <!-- 5码 -->
            <div class="bg-white border rounded-3xl p-6">
                <div class="text-amber-600 font-bold text-lg mb-3">5码参考</div>
                <div class="flex gap-3 flex-wrap">
                    <div class="number-ball">1</div>
                    <div class="number-ball">2</div>
                    <div class="number-ball">5</div>
                    <div class="number-ball">6</div>
                    <div class="number-ball">0</div>
                </div>
            </div>

            <!-- 多码推荐 -->
            <div class="bg-white border rounded-3xl p-6">
                <div class="text-violet-600 font-bold text-lg mb-3">多码推荐（8注）</div>
                <div class="grid grid-cols-2 gap-y-3 text-lg font-mono">
                    <div>125</div><div>256</div><div>056</div><div>126</div>
                    <div>015</div><div>236</div><div>156</div><div>025</div>
                </div>
            </div>

            <!-- 重点推荐 -->
            <div class="bg-white border rounded-3xl p-6">
                <div class="text-red-600 font-bold text-lg mb-3">重点推荐（3注）</div>
                <div class="space-y-4">
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-red-600 w-20">重点1：</span>
                        <span class="font-mono text-2xl">125</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-red-600 w-20">重点2：</span>
                        <span class="font-mono text-2xl">256</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-red-600 w-20">重点3：</span>
                        <span class="font-mono text-2xl">056</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-8 text-xs text-zinc-400">
        本站仅供娱乐参考，彩票有风险，购买需谨慎。
    </footer>
</body>
</html>
