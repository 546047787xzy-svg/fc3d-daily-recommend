<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="小许3D推荐 - 福彩3D每日智能分析、最新开奖、历史数据查询">
    <title>小许3D推荐 | 每日智能分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .number-ball { 
            width: 48px; height: 48px; 
            display:flex; align-items:center; justify-content:center; 
            font-weight:700; font-size:1.3rem; 
            background:linear-gradient(145deg,#c8102e,#a50d26); 
            color:white; border-radius:9999px; 
            box-shadow:0 4px 6px -1px rgb(200 16 46 / 0.4); 
        }
    </style>
</head>
<body class="bg-zinc-50">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-red-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-dice text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">小许3D推荐</h1>
                    <p class="text-xs text-zinc-500 -mt-1">每日智能分析</p>
                </div>
            </div>
            <div class="text-xs text-emerald-600 font-medium">最后更新：2026-05-26 12:10</div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-x-2 bg-white px-4 py-1.5 rounded-3xl shadow-sm border mb-3">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="font-medium text-sm">第2026135期 · 2026-05-25</span>
            </div>
            <h2 class="text-4xl font-bold tracking-tighter">小许3D推荐</h2>
        </div>

        <!-- 最新开奖 -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-sm text-zinc-500">最新开奖</div>
                    <div class="flex items-center gap-x-3 mt-2">
                        <div class="flex gap-x-2">
                            <div class="number-ball">7</div>
                            <div class="number-ball">9</div>
                            <div class="number-ball">0</div>
                        </div>
                        <div class="ml-3">
                            <span class="font-semibold">组六</span><br>
                            <span class="text-xs text-zinc-500">和值16 · 跨度9</span>
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-xs text-zinc-500">试机号</div>
                    <div class="font-mono text-2xl font-bold text-red-600">723</div>
                </div>
            </div>
        </div>

        <!-- 今日推荐 -->
        <div class="mb-8">
            <h3 class="text-2xl font-semibold mb-4 px-1">今日智能推荐</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="bg-white border rounded-3xl p-5 cursor-pointer" onclick="copyNumbers([4,8,2])">
                    <div class="flex justify-between mb-3">
                        <span class="text-xs px-2.5 py-1 rounded-full bg-red-100 text-red-600">直选</span>
                    </div>
                    <div class="flex gap-x-2 mb-4">
                        <div class="number-ball">4</div>
                        <div class="number-ball">8</div>
                        <div class="number-ball">2</div>
                    </div>
                    <div class="text-sm text-zinc-600">热码延续 + 冷码回调</div>
                </div>

                <div class="bg-white border rounded-3xl p-5 cursor-pointer" onclick="copyNumbers([3,7,9])">
                    <div class="flex justify-between mb-3">
                        <span class="text-xs px-2.5 py-1 rounded-full bg-red-100 text-red-600">直选</span>
                    </div>
                    <div class="flex gap-x-2 mb-4">
                        <div class="number-ball">3</div>
                        <div class="number-ball">7</div>
                        <div class="number-ball">9</div>
                    </div>
                    <div class="text-sm text-zinc-600">跨度回升趋势推荐</div>
                </div>

                <div class="bg-white border rounded-3xl p-5 cursor-pointer" onclick="copyNumbers([0,2,3,5,7,9])">
                    <div class="flex justify-between mb-3">
                        <span class="text-xs px-2.5 py-1 rounded-full bg-violet-100 text-violet-600">组六</span>
                    </div>
                    <div class="flex gap-x-2 mb-4">
                        <div class="number-ball">0</div>
                        <div class="number-ball">2</div>
                        <div class="number-ball">3</div>
                        <div class="number-ball">5</div>
                        <div class="number-ball">7</div>
                        <div class="number-ball">9</div>
                    </div>
                    <div class="text-sm text-zinc-600">综合热冷码大底</div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-6 border">
            <h4 class="font-semibold mb-4">数据分析摘要</h4>
            <div class="text-sm text-zinc-600">
                最新开奖790（大号跨度大），下一期中小号回调概率较高。热码4、7、8仍有惯性，冷码2、3、5值得关注。
            </div>
        </div>
    </div>

    <footer class="text-center py-8 text-xs text-zinc-400">
        本站仅供娱乐参考，彩票有风险，购买需谨慎。
    </footer>

    <script>
        function copyNumbers(numbers) {
            navigator.clipboard.writeText(numbers.join('')).then(() => {
                alert('已复制：' + numbers.join(''));
            });
        }
    </script>
</body>
</html>
