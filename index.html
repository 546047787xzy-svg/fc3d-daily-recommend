<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小许3D推荐 | 每日智能分析</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      color-scheme: light;
      --red: #c8102e;
      --ink: #18181b;
      --muted: #71717a;
      --line: #e4e4e7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(200, 16, 46, .08), rgba(255, 255, 255, 0) 280px),
        #f6f7f9;
    }

    .app-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px;
    }

    .ball {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--size, 44px);
      height: var(--size, 44px);
      flex: 0 0 var(--size, 44px);
      border-radius: 50%;
      color: #fff;
      font-weight: 800;
      font-size: var(--font, 1.15rem);
      line-height: 1;
      background: radial-gradient(circle at 30% 24%, #ff8a99 0, #f13751 28%, #c8102e 62%, #8f1026 100%);
      box-shadow: inset 0 -5px 10px rgba(80, 0, 15, .25), 0 8px 18px rgba(200, 16, 46, .18);
    }

    .ball.sm { --size: 32px; --font: .92rem; }
    .ball.lg { --size: 72px; --font: 2rem; }
    .ball.cold {
      background: radial-gradient(circle at 30% 24%, #cbd5e1 0, #64748b 48%, #334155 100%);
      box-shadow: inset 0 -5px 10px rgba(15, 23, 42, .25), 0 8px 18px rgba(51, 65, 85, .16);
    }

    .panel {
      background: rgba(255, 255, 255, .92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 16px 34px rgba(24, 24, 27, .06);
    }

    .metric {
      min-height: 126px;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #eef2f7;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      min-width: 4%;
      border-radius: inherit;
      background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444);
    }

    .table-wrap {
      overflow-x: auto;
    }

    @media (max-width: 640px) {
      .app-shell { padding: 14px; }
      .ball { --size: 38px; --font: 1rem; }
      .ball.lg { --size: 58px; --font: 1.6rem; }
    }
  </style>
</head>
<body>
  <header class="sticky top-0 z-40 border-b border-zinc-200 bg-white/88 backdrop-blur">
    <div class="app-shell py-3">
      <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <div class="flex h-11 w-11 items-center justify-center rounded-lg bg-red-700 text-white">
            <i class="fa-solid fa-dice-three text-2xl"></i>
          </div>
          <div>
            <h1 class="text-xl font-black tracking-normal sm:text-2xl">小许3D推荐</h1>
            <p class="text-xs text-zinc-500">每日自动抓取 · 趋势分析 · 回测参考</p>
          </div>
        </div>
        <div id="update-time" class="hidden text-right text-xs text-zinc-500 sm:block"></div>
      </div>
    </div>
  </header>

  <main class="app-shell" id="main-content">
    <div id="loading" class="panel mt-6 flex min-h-64 flex-col items-center justify-center p-8 text-zinc-500">
      <i class="fa-solid fa-spinner fa-spin mb-4 text-3xl text-red-700"></i>
      <p class="font-medium">正在加载今日数据...</p>
    </div>
  </main>

  <footer class="app-shell pb-8 pt-2 text-center text-xs text-zinc-400">
    本站内容仅供娱乐和数据学习参考，彩票有风险，购买需谨慎。
  </footer>

  <script>
    const numberBall = (n, size = "", tone = "") =>
      `<span class="ball ${size} ${tone}" aria-label="号码 ${n}">${n}</span>`;

    const pct = value => `${Number(value || 0).toFixed(1).replace(".0", "")}%`;

    async function loadData() {
      try {
        const response = await fetch(`data.json?t=${Date.now()}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        render(data);
      } catch (error) {
        document.getElementById("loading").innerHTML = `
          <i class="fa-solid fa-circle-exclamation mb-4 text-3xl text-red-600"></i>
          <p class="font-semibold text-red-600">数据加载失败</p>
          <p class="mt-2 text-sm text-zinc-500">请稍后刷新页面，或检查 data.json 是否已生成。</p>
        `;
      }
    }

    function render(data) {
      const { period, date, update_time, latest, history = [], analysis, recommendations: rec, backtest } = data;
      const updateTime = data.update_failed
        ? `上次更新失败：${data.failed_time || update_time || "-"}`
        : `更新于 ${update_time || "-"}`;
      document.getElementById("update-time").textContent = updateTime;

      const missValues = Object.values(analysis.miss || {}).map(Number);
      const missMax = Math.max(...missValues, 1);
      const missRows = Array.from({ length: 10 }, (_, i) => {
        const miss = Number(analysis.miss?.[i] ?? analysis.miss?.[String(i)] ?? 0);
        const width = Math.round((miss / missMax) * 100);
        const tone = miss >= 5 ? "text-red-600 font-bold" : miss >= 3 ? "text-amber-600 font-semibold" : "text-zinc-500";
        return `
          <div class="grid grid-cols-[24px_1fr_34px] items-center gap-2">
            <span class="text-center font-mono text-sm font-bold">${i}</span>
            <div class="progress"><span style="width:${width}%"></span></div>
            <span class="text-right text-xs ${tone}">${miss}</span>
          </div>
        `;
      }).join("");

      const roadHtml = Object.entries(analysis.road_ratio || {}).map(([label, value]) => `
        <div class="rounded-lg border border-zinc-200 bg-zinc-50 px-4 py-3 text-center">
          <div class="text-xl font-black">${value}%</div>
          <div class="mt-1 text-xs text-zinc-500">${label}</div>
        </div>
      `).join("");

      const combosHtml = (rec.combos || []).map(combo => `
        <div class="flex items-center justify-between gap-3 rounded-lg border border-zinc-200 bg-white px-4 py-3">
          <span class="text-sm font-bold text-red-700">${combo.label}</span>
          <div class="flex gap-2">${combo.numbers.map(n => numberBall(n, "sm")).join("")}</div>
        </div>
      `).join("");

      const historyHtml = history.map(item => `
        <tr class="border-b border-zinc-100 last:border-0">
          <td class="whitespace-nowrap px-4 py-3 text-xs text-zinc-500">${item.period}</td>
          <td class="px-4 py-3">
            <div class="flex gap-1.5">${item.numbers.map(n => numberBall(n, "sm")).join("")}</div>
          </td>
          <td class="whitespace-nowrap px-4 py-3 text-sm font-semibold">${item.type}</td>
          <td class="whitespace-nowrap px-4 py-3 text-sm text-zinc-500">和值 ${item.sum} · 跨度 ${item.span}</td>
        </tr>
      `).join("");

      const summary = backtest?.summary || {};
      const backtestCards = [
        ["独胆", summary.dan1],
        ["双胆", summary.dan2],
        ["三胆", summary.dan3],
        ["五码", summary.code5],
      ].map(([label, item]) => `
        <div class="rounded-lg border border-zinc-200 bg-zinc-50 p-4">
          <div class="text-xs text-zinc-500">${label}命中率</div>
          <div class="mt-1 text-2xl font-black">${pct(item?.rate)}</div>
          <div class="mt-1 text-xs text-zinc-400">命中 ${item?.hit || 0} / ${summary.total || 0}</div>
        </div>
      `).join("");

      const failedBanner = data.update_failed ? `
        <div class="mb-5 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
          <i class="fa-solid fa-triangle-exclamation mr-2"></i>
          今日自动抓取失败，页面正在展示上次成功更新的数据。
        </div>
      ` : "";

      document.getElementById("loading").remove();
      document.getElementById("main-content").innerHTML = `
        <section class="py-6">
          ${failedBanner}
          <div class="grid gap-5 lg:grid-cols-[1.1fr_.9fr]">
            <div class="panel p-6">
              <div class="flex flex-wrap items-start justify-between gap-4">
                <div>
                  <div class="inline-flex items-center gap-2 rounded-full border border-red-200 bg-red-50 px-3 py-1 text-sm font-semibold text-red-700">
                    <span class="h-2 w-2 rounded-full bg-emerald-500"></span>
                    第 ${period} 期 · ${date}
                  </div>
                  <h2 class="mt-4 text-3xl font-black tracking-normal sm:text-4xl">今日推荐</h2>
                  <p class="mt-2 text-sm text-zinc-500">${updateTime}</p>
                </div>
                <div class="text-left sm:text-right">
                  <div class="text-xs text-zinc-500">最新开奖</div>
                  <div class="mt-2 flex gap-2">${latest.numbers.map(n => numberBall(n)).join("")}</div>
                  <div class="mt-2 text-sm font-semibold">${latest.type} · 和值 ${latest.sum} · 跨度 ${latest.span}</div>
                </div>
              </div>
            </div>

            <div class="panel p-6">
              <div class="mb-4 flex items-center gap-2 font-bold">
                <i class="fa-solid fa-bullseye text-red-700"></i>
                重点组合
              </div>
              <div class="space-y-3">${combosHtml}</div>
            </div>
          </div>

          <div class="mt-5 grid gap-5 md:grid-cols-3">
            <div class="panel metric flex flex-col items-center justify-center p-5 text-center">
              <div class="mb-3 text-sm font-bold text-red-700">独胆</div>
              ${numberBall(rec.dan1, "lg")}
            </div>
            <div class="panel metric flex flex-col items-center justify-center p-5 text-center">
              <div class="mb-3 text-sm font-bold text-red-700">双胆</div>
              <div class="flex gap-3">${rec.dan2.map(n => numberBall(n)).join("")}</div>
            </div>
            <div class="panel metric flex flex-col items-center justify-center p-5 text-center">
              <div class="mb-3 text-sm font-bold text-red-700">三胆</div>
              <div class="flex gap-3">${rec.dan3.map(n => numberBall(n)).join("")}</div>
            </div>
          </div>

          <div class="mt-5 grid gap-5 lg:grid-cols-[.9fr_1.1fr]">
            <div class="panel p-6">
              <div class="mb-4 flex items-center gap-2 font-bold">
                <i class="fa-solid fa-list-ol text-amber-600"></i>
                五码参考
              </div>
              <div class="flex flex-wrap gap-3">${rec.code5.map(n => numberBall(n)).join("")}</div>
              <p class="mt-4 text-sm leading-7 text-zinc-600">${analysis.text}</p>
            </div>

            <div class="panel p-6">
              <div class="mb-4 flex items-center gap-2 font-bold">
                <i class="fa-solid fa-chart-line text-sky-600"></i>
                趋势分析
              </div>
              <div class="grid gap-5 md:grid-cols-2">
                <div>
                  <div class="mb-2 text-sm font-semibold text-zinc-600">热码</div>
                  <div class="mb-5 flex flex-wrap gap-2">${analysis.hot.map(n => numberBall(n, "sm")).join("")}</div>
                  <div class="mb-2 text-sm font-semibold text-zinc-600">冷码</div>
                  <div class="flex flex-wrap gap-2">${analysis.cold.map(n => numberBall(n, "sm", "cold")).join("")}</div>
                </div>
                <div>
                  <div class="mb-2 text-sm font-semibold text-zinc-600">012路分布</div>
                  <div class="grid grid-cols-3 gap-2">${roadHtml}</div>
                  <div class="mt-3 text-xs text-zinc-500">和值参考：${analysis.sum_range}</div>
                </div>
              </div>
              <div class="mt-6">
                <div class="mb-3 text-sm font-semibold text-zinc-600">遗漏期数</div>
                <div class="space-y-2">${missRows}</div>
              </div>
            </div>
          </div>

          <div class="mt-5 grid gap-5 lg:grid-cols-[.9fr_1.1fr]">
            <div class="panel p-6">
              <div class="mb-4 flex items-center gap-2 font-bold">
                <i class="fa-solid fa-gauge-high text-emerald-600"></i>
                回测表现
              </div>
              <div class="grid grid-cols-2 gap-3">${backtestCards}</div>
            </div>

            <div class="panel overflow-hidden">
              <div class="border-b border-zinc-200 px-6 py-4 font-bold">近期开奖记录</div>
              <div class="table-wrap">
                <table class="w-full min-w-[560px]">
                  <thead class="bg-zinc-50 text-xs text-zinc-500">
                    <tr>
                      <th class="px-4 py-3 text-left">期号</th>
                      <th class="px-4 py-3 text-left">号码</th>
                      <th class="px-4 py-3 text-left">类型</th>
                      <th class="px-4 py-3 text-left">和值 / 跨度</th>
                    </tr>
                  </thead>
                  <tbody>${historyHtml}</tbody>
                </table>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    loadData();
  </script>
</body>
</html>
